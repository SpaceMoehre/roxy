<h3>Intruder Module</h3>
<div class="stack">
  <label for="setting-intruder-refresh-ms">Auto refresh interval (ms)</label>
  <input id="setting-intruder-refresh-ms" type="number" min="1000" step="500" />
  <label for="setting-intruder-default-scheme">Default scheme</label>
  <select id="setting-intruder-default-scheme">
    <option value="http">http</option>
    <option value="https">https</option>
  </select>
  <p class="hint">Controls defaults for Intruder jobs and automatic jobs panel updates.</p>
</div>
