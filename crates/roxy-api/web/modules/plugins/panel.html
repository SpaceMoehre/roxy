<article class="card">
  <div class="panel-head">
    <h3>Installed Plugins</h3>
    <button id="plugins-refresh">Refresh</button>
  </div>

  <div class="stack">
    <label for="plugins-select">Plugin</label>
    <select id="plugins-select"></select>
  </div>

  <div class="split-grid">
    <section class="card compact" id="plugins-string-substitute-settings">
      <div class="panel-head">
        <h4>String Substitution Rules</h4>
        <button id="plugins-string-substitute-add-rule">Add Rule</button>
      </div>
      <p class="hint">
        Rules are applied sequentially. Scope can be <code>request</code>, <code>response</code>,
        or <code>both</code>.
      </p>
      <div id="plugins-string-substitute-rules" class="stack"></div>
    </section>

    <section class="card compact">
      <h4>Raw Plugin Settings (JSON)</h4>
      <textarea id="plugins-settings-json" rows="10" spellcheck="false">{}</textarea>
      <div class="button-row">
        <button id="plugins-save-settings" class="accent">Save Settings</button>
      </div>
    </section>
  </div>

  <section class="card compact">
    <div class="panel-head">
      <h4>Altered Requests / Responses</h4>
      <button id="plugins-refresh-alterations">Refresh</button>
    </div>
    <div id="plugins-alterations" class="scroll-list"></div>
  </section>
</article>
