<div class="panel-head">
  <h2>Repeater</h2>
</div>
<article class="card">
  <form id="repeater-form" class="stack">
    <label for="repeater-default-scheme">Default Scheme (for origin-form targets)</label>
    <select id="repeater-default-scheme">
      <option value="http">http</option>
      <option value="https">https</option>
    </select>
    <label for="repeater-request">Raw Request (blob)</label>
    <textarea id="repeater-request" rows="14">GET / HTTP/1.1
Host: 127.0.0.1:8080
Connection: close

</textarea>
    <button type="submit" class="accent">Send</button>
  </form>
  <pre id="repeater-output" class="output"></pre>
</article>
