<div class="panel-head">
  <h2>Decoder</h2>
</div>
<article class="card">
  <form id="decoder-form" class="stack">
    <label for="decoder-mode">Mode</label>
    <select id="decoder-mode">
      <option value="base64_encode">base64_encode</option>
      <option value="base64_decode">base64_decode</option>
      <option value="plugin:decoder-codec:base64_encode">plugin:decoder-codec:base64_encode</option>
      <option value="plugin:decoder-codec:base64_decode">plugin:decoder-codec:base64_decode</option>
      <option value="plugin:decoder-codec:base32_encode">plugin:decoder-codec:base32_encode</option>
      <option value="plugin:decoder-codec:base32_decode">plugin:decoder-codec:base32_decode</option>
      <option value="plugin:decoder-codec:hex_encode">plugin:decoder-codec:hex_encode</option>
      <option value="plugin:decoder-codec:hex_decode">plugin:decoder-codec:hex_decode</option>
      <option value="plugin:decoder-codec:url_encode">plugin:decoder-codec:url_encode</option>
      <option value="plugin:decoder-codec:url_decode">plugin:decoder-codec:url_decode</option>
      <option value="plugin:decoder-codec:html_encode">plugin:decoder-codec:html_encode</option>
      <option value="plugin:decoder-codec:html_decode">plugin:decoder-codec:html_decode</option>
    </select>
    <label for="decoder-input">Input</label>
    <textarea id="decoder-input" rows="8"></textarea>
    <button type="submit" class="accent">Transform</button>
  </form>
  <pre id="decoder-output" class="output"></pre>
</article>
