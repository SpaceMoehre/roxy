version: "3.9"

services:
  roxy:
    build:
      context: .
      dockerfile: Dockerfile
    image: roxy:local
    container_name: roxy
    init: true
    restart: unless-stopped
    environment:
      ROXY_BIND: 0.0.0.0:8080
      ROXY_DATA_DIR: /data
      ROXY_PLUGIN_DIR: /app/plugins
      RUST_LOG: info
    ports:
      - "8080:8080"
    volumes:
      - roxy_data:/data
      - ./plugins:/app/plugins:ro
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import sys,urllib.request;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/api/v1/health',timeout=2).status==200 else 1)",
        ]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 20s
    stop_grace_period: 15s

volumes:
  roxy_data:
